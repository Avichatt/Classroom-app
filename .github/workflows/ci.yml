# ============================================
# GitHub Actions CI Workflow
# ============================================
name: Classroom CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install dependencies
        working-directory: ./server
        run: npm ci
        
      - name: Typecheck
        working-directory: ./server
        run: npx tsc --noEmit

  test-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Build React App
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001/api # Mock URL for build

  docker-build:
    name: Build Docker Images Verify
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Backend Image
        working-directory: ./server
        run: docker build -t classroom-api:latest .
        
      - name: Build Frontend Image
        run: docker build -t classroom-web:latest -f Dockerfile.frontend .
